<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SliderJS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1 class="title">Слайдер - адаптивный</h1>
        <div class="slider">
            <div class="slider-line">
                <img class="slider-img" src="./images/1.jpg" alt="Slider Image1">
                <img class="slider-img" src="./images/2.jpg" alt="Slider Image2">
                <img class="slider-img" src="./images/3.jpg" alt="Slider Image3">
                <img class="slider-img" src="./images/4.jpg" alt="Slider Image4">
                <img class="slider-img" src="./images/5.jpg" alt="Slider Image5">
                <img class="slider-img" src="./images/6.jpg" alt="Slider Image6">

            </div>
        </div>
        <span class="counter"></span>
        <div class="btn-container">
            <button class="button prev-btn">Prev</button>
            <button class="button next-btn">Next</button>
        </div>


    </div>



    <script defer src="slider.js"></script>

</body>

</html>
